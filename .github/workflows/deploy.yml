# .github/workflows/deploy.yml - Deploy to Cloud Run on push to main
name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: chat-app-demo-459315
  REGION: us-central1
  SERVICE_NAME: vague-descriptions-checker-api
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: cloud-run-images

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Check out the repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to GCP using Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/781395648013/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@chat-app-demo-459315.iam.gserviceaccount.com"

      # Set up gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Configure Docker to use gcloud for authentication
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # Build the Docker image
      - name: Build
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest \
            .

      # Push to Artifact Registry
      - name: Push
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest


      # NEW STEP: Ported from your deploy.sh script
      - name: Prepare environment variables
        run: |
          echo "📝 Preparing environment variables..."
          if [ -f .env ]; then
              # Strip comments/empty lines and convert to YAML format
              grep -v '^#' .env | grep -v '^[[:space:]]*$' | \
              sed 's/ *= */: /' | \
              sed 's/: \(.*\)/: "\1"/' | \
              sed 's/""/"/g' > env-vars.yaml
              echo "LOG_LEVEL: \"DEBUG\"" >> env-vars.yaml
          else
              echo "LOG_LEVEL: \"DEBUG\"" > env-vars.yaml
          fi

      # UPDATED STEP: Includes the new params from deploy.sh
      - name: Deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --env-vars-file=env-vars.yaml \
            --vpc-connector="vpc-conn" \
            --vpc-egress="private-ranges-only" \
            --tag=green \
            --no-traffic \
            --use-http2 \ # Optional, for features such as gRPC support, Bidirectional Streaming, Multiplexing, Server Push
            --health-check-type=http \
            --liveness-probe-path=/health \
            --startup-probe-path=/health \
            --startup-probe-initial-delay=30s \
            --startup-probe-timeout=5s \
            --startup-probe-failure-threshold=10

      - name: Validate and Migrate Traffic
        run: |
          # 1. Get the Service URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')
          
          # 2. Construct the Tagged URL (e.g., https://green---myapp.a.run.app)
          TAG_URL="https://green---${SERVICE_URL#https://}"
          
          echo "🔍 Performing Smoke Test on new revision at: $TAG_URL"
          
          # 3. Simple Health Check (Retries 5 times)
          success=false
          for i in {1..5}; do
            if curl -f "$TAG_URL/health"; then
              success=true
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          if [ "$success" = false ]; then
            echo "❌ New revision is unstable. Automatic Rollback: Deleting tag and keeping old traffic."
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --remove-tags=green
            exit 1
          fi

          echo "✅ Smoke test passed! Splitting traffic..."
          
          # 4. Canary Release: 5% to Green, 90% to current
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --to-revisions=green=5
          
          # (Optional) Add a soak period here
          # sleep 60 

          # 5. Full Rollout: Shift 100% to the latest revision
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --to-latest

      # Output the service URL
      - name: Show URL
        run: |
          echo "Service URL:"
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)"