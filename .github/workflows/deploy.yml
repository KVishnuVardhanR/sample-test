# .github/workflows/deploy.yml - Deploy to Cloud Run on push to main
name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: chat-app-demo-459315
  REGION: us-central1
  SERVICE_NAME: vague-descriptions-checker-api
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: cloud-run-images

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/781395648013/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@chat-app-demo-459315.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and Push
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      # 1. GENERATE SERVICE YAML
      - name: Generate Service YAML
        run: |
          cat <<EOF > service.yaml
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: ${{ env.SERVICE_NAME }}
            annotations:
              run.googleapis.com/launch-stage: BETA
          spec:
            template:
              metadata:
                annotations:
                  run.googleapis.com/vpc-access-connector: "vpc-conn"
                  run.googleapis.com/vpc-access-egress: "private-ranges-only"
              spec:
                containers:
                - image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
                  ports:
                  - containerPort: 8080
                    name: h2c
                  startupProbe:
                    initialDelaySeconds: 30
                    timeoutSeconds: 5
                    failureThreshold: 10
                    httpGet:
                      path: /health
                  livenessProbe:
                    httpGet:
                      path: /health
                  env:
          EOF
          if [ -f .env ]; then
            grep -v '^#' .env | grep -v '^[[:space:]]*$' | while read -r line; do
              key=$(echo $line | cut -d '=' -f 1)
              value=$(echo $line | cut -d '=' -f 2- | sed 's/^"//;s/"$//')
              echo "                  - name: $key" >> service.yaml
              echo "                    value: \"$value\"" >> service.yaml
            done
          fi
          echo "                  - name: LOG_LEVEL" >> service.yaml
          echo "                    value: \"DEBUG\"" >> service.yaml

      # 2. DEPLOY WITHOUT TRAFFIC (Initial Safety Deployment)
      - name: Deploy Revision (No Traffic)
        run: |
          gcloud run services replace service.yaml --region=${{ env.REGION }}
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --tag=canary \
            --no-traffic

      # 3. SMOKE TEST (Automatic Rollback Logic)
      - name: Run Smoke Tests
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')
          CANARY_URL="https://canary---${SERVICE_URL#https://}/health"
          
          echo "🔍 Testing canary revision at: $CANARY_URL"
          
          success=false
          for i in {1..5}; do
            if curl -f "$CANARY_URL"; then
              success=true
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          if [ "$success" = false ]; then
            echo "❌ Smoke test failed. Rollback: Removing canary tag and halting rollout."
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --remove-tags=canary
            exit 1
          fi

      # 4. TRAFFIC SPLIT & FULL ROLLOUT
      - name: Route Traffic
        run: |
          echo "✅ Health check passed. Moving 100% traffic to the latest revision."
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --to-latest \
            --region=${{ env.REGION }}

      # 5. CLEAN UP OLD REVISIONS (Keep last 5)
      - name: Cleanup Old Revisions
        run: |
          echo "🧹 Cleaning up old revisions..."
          gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --sort-by="~creationTimestamp" \
            --format="value(REVISION)" | tail -n +6 | while read revision; do
            echo "Deleting $revision"
            gcloud run revisions delete "$revision" --region=${{ env.REGION }} --quiet
          done
