# .github/workflows/deploy.yml - Deploy to Cloud Run on push to main
name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: chat-app-demo-459315
  REGION: us-central1
  SERVICE_NAME: vague-descriptions-checker-api
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: cloud-run-images

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/781395648013/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deployer@chat-app-demo-459315.iam.gserviceaccount.com"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and Push
        run: |
          IMAGE_TAG=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      - name: Prepare environment variables
        run: |
          if [ -f .env ]; then
              grep -v '^#' .env | grep -v '^[[:space:]]*$' | \
              sed 's/ *= */: /' | sed 's/: \(.*\)/: "\1"/' | sed 's/""/"/g' > env-vars.yaml
              echo "LOG_LEVEL: \"DEBUG\"" >> env-vars.yaml
          else
              echo "LOG_LEVEL: \"DEBUG\"" > env-vars.yaml
          fi

      # 1. GENERATE SERVICE YAML (Fixes the unrecognized arguments error)
      - name: Generate Service YAML
        run: |
          cat <<EOF > service.yaml
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: ${{ env.SERVICE_NAME }}
            annotations:
              run.googleapis.com/launch-stage: BETA
          spec:
            template:
              metadata:
                annotations:
                  run.googleapis.com/vpc-access-connector: "vpc-conn"
                  run.googleapis.com/vpc-access-egress: "private-ranges-only"
              spec:
                containers:
                - image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
                  ports:
                  - containerPort: 8080
                    name: h2c
                  startupProbe:
                    initialDelaySeconds: 30
                    timeoutSeconds: 5
                    failureThreshold: 10
                    httpGet:
                      path: /health
                  livenessProbe:
                    httpGet:
                      path: /health
                  env:
          EOF
          # Append env-vars.yaml content to the service.yaml under env key
          sed 's/^/                  /' env-vars.yaml >> service.yaml

      # 2. DEPLOY (Apply the YAML configuration)
      - name: Deploy Service Configuration
        run: |
          gcloud run services replace service.yaml --region=${{ env.REGION }}

      # 3. TAG FOR CANARY (Create the 'green' pointer for traffic splitting)
      - name: Tag New Revision
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --tag=green \
            --no-traffic

      # 4. VALIDATE & MIGRATE
      - name: Validate and Migrate Traffic
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)')
          TAG_URL="https://green---${SERVICE_URL#https://}"
          
          echo "🔍 Testing new revision at: $TAG_URL"
          
          success=false
          for i in {1..5}; do
            if curl -f "$TAG_URL/health"; then
              success=true
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          if [ "$success" = false ]; then
            echo "❌ Rollback: Removing tag 'green'. Traffic stays on old revision."
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --remove-tags=green
            exit 1
          fi

          echo "✅ Splitting 5% traffic to Green..."
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --to-revisions=green=5
          
          echo "🚀 Shifting 100% to latest revision..."
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --to-latest

      - name: Show URL
        run: gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format="value(status.url)"
