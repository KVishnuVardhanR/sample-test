name: Python Testing CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Service containers to run with this job
    services:
      redis:
        image: redis
        # Use the port defined in your .env / CallbacksManager
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" # Matches your Dockerfile parent image

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-asyncio pytest-mock # Testing requirements

    - name: Run Pytest
      env:
        # Override Redis host for the GitHub runner environment
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        GOOGLE_CLOUD_LOCATION: us-central1
        GOOGLE_CLOUD_PROJECT: chat-app-demo-459315
        GOOGLE_GENAI_MODEL: gemini-2.5-flash-lite
      run: |
        pytest
